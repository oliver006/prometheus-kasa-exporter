name: Docker Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN || secrets.DOCKER_PASS }}
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || secrets.DOCKER_IMAGE || format('{0}/{1}', secrets.DOCKER_USER, github.event.repository.name) }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub configuration
        run: |
          : "${DOCKER_USER:?Set the DOCKER_USER secret}"
          : "${DOCKER_TOKEN:?Set the DOCKER_TOKEN secret or DOCKER_PASS secret}"
          : "${DOCKER_IMAGE:?Set the DOCKER_IMAGE variable/secret or DOCKER_USER secret}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
